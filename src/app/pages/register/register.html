<div class="auth-page">
  <div class="auth-card">
    <a class="auth-logo" routerLink="/">✨ English Buddy</a>
    <h1 class="auth-title">Tạo tài khoản</h1>
    <p class="auth-sub">Bắt đầu hành trình luyện tiếng Anh của bạn!</p>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="field">
        <label for="username">Tên hiển thị</label>
        <input
          id="username" type="text" name="username"
          [(ngModel)]="username"
          placeholder="Nguyễn Văn A"
          autocomplete="name"
          required
        />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input
          id="email" type="email" name="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <div class="input-wrap">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            placeholder="Ít nhất 6 ký tự"
            autocomplete="new-password"
            required
          />
          <button type="button" class="eye-btn" (click)="showPassword.set(!showPassword())">
            {{ showPassword() ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <div class="field">
        <label for="confirm">Xác nhận mật khẩu</label>
        <div class="input-wrap">
          <input
            id="confirm"
            [type]="showPassword() ? 'text' : 'password'"
            name="confirm"
            [(ngModel)]="confirmPassword"
            placeholder="Nhập lại mật khẩu"
            autocomplete="new-password"
            required
          />
        </div>
      </div>

      <button
        type="submit"
        class="btn-primary"
        [disabled]="loading() || !username || !email || !password || !confirmPassword"
      >
        @if (loading()) { <span class="spinner"></span> } Đăng ký
      </button>
    </form>

    <div class="divider"><span>hoặc đăng ký với</span></div>

    <div class="oauth-group">
      <div #googleBtn class="google-btn-wrap"></div>

      <button type="button" class="btn-facebook" (click)="loginFacebook()" [disabled]="loading()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>
        Tiếp tục với Facebook
      </button>
    </div>

    <p class="auth-link">
      Đã có tài khoản? <a routerLink="/login">Đăng nhập</a>
    </p>
  </div>
</div>

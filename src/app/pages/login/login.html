<div class="auth-page">
  <div class="auth-card">
    <a class="auth-logo" routerLink="/">
      <svg width="26" height="26" viewBox="50 50 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="50" y="50" width="160" height="160" rx="36" fill="#1E40AF"/>
        <path d="M95 80L95 170L170 170" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="170" cy="170" r="9" fill="#FBBF24"/>
      </svg>
      Luyện Ngoại Ngữ
    </a>
    <h1 class="auth-title">Đăng nhập</h1>
    <p class="auth-sub">Chào mừng bạn trở lại!</p>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email" type="email" name="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <div class="input-wrap">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="eye-btn" (click)="showPassword.set(!showPassword())">
            {{ showPassword() ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> } Đăng nhập
      </button>
    </form>

    <div class="divider"><span>hoặc đăng nhập với</span></div>

    <div class="oauth-group">
      <div #googleBtn class="google-btn-wrap"></div>

      <button type="button" class="btn-facebook" (click)="loginFacebook()" [disabled]="loading()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>
        Tiếp tục với Facebook
      </button>
    </div>

    <p class="auth-link">
      Chưa có tài khoản? <a routerLink="/register">Đăng ký ngay</a>
    </p>
  </div>
</div>
